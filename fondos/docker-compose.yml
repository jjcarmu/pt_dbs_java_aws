version: '3.8'
services:
  mongodb:
    image: mongo:latest
    container_name: btg_mongodb
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USERNAME}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD}
      MONGO_INITDB_DATABASE: ${MONGO_DB_NAME}
    volumes:
      - ./docker-config/mongodb/mongo-init.js:/docker-entrypoint-initdb.d/mongo-init.js:ro
      - mongo_data:/data/db
    healthcheck:
      test: [ "CMD", "mongo", "--eval", "db.runCommand('ping').ok == 1" ]
      interval: 10s
      timeout: 10s
      retries: 3

  mongo-express:
    image: mongo-express
    container_name: btg_mongo_express
    #restart: always
    ports:
      - "8081:8081"
    environment:
      ME_CONFIG_MONGODB_URL: mongodb://${MONGO_USERNAME}:${MONGO_PASSWORD}@${MONGO_HOST}:27017/${MONGO_INITDB_DATABASE}
      ME_CONFIG_MONGODB_ADMINUSERNAME: ${MONGO_USERNAME}
      ME_CONFIG_MONGODB_ADMINPASSWORD: ${MONGO_PASSWORD}
      #ME_CONFIG_BASICAUTH: "false"
    depends_on:
      - mongodb
    healthcheck:
      test: [ "CMD", "curl", "--silent", "--fail", "http://localhost:8081" ]
      interval: 10s
      timeout: 10s
      retries: 3

  app-java:
    build: .
    container_name: btg_java_app
    ports:
      - "8086:8086"
    environment:
      SPRING_DATA_MONGODB_HOST: ${MONGO_HOST}
      SPRING_DATA_MONGODB_PORT: 27017
      SPRING_DATA_MONGODB_DATABASE: ${MONGO_DB_NAME}
      SPRING_DATA_MONGODB_USERNAME: ${MONGO_USERNAME}
      SPRING_DATA_MONGODB_PASSWORD: ${MONGO_PASSWORD}
    depends_on:
      - mongodb

volumes:
  mongo_data:
    driver: local